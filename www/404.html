<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; margin-top: 100px; background: #222; color: #eee;}
        h1 { font-size: 5rem; color: #ff5555; margin-bottom: 10px; }
        .box { background: #333; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: inline-block;}
        a { color: #55aaff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <h2>Oops! The wind blew this page away.</h2>
        <p>The file you are looking for does not exist on the Vento server.</p>
        <br>
        <a href="/">Return to Home</a>
    </div>
</body>
</html>
