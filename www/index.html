<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vento Web Server</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #ffffff;
            font-weight: normal;
        }
        p {
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.6;
            margin: 0.5rem 0;
        }
        a {
            color: #4da6ff;
            text-decoration: none;
            border-bottom: 1px dashed #4da6ff;
            transition: color 0.2s, border-bottom 0.2s;
        }
        a:hover {
            color: #80c1ff;
            border-bottom: 1px solid #80c1ff;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.95rem;
            color: #888888;
        }
    </style>
</head>
<body>
    <h1>~ vento ~</h1>
    <p>The server is running successfully.</p>
    <div class="footer">
        <p>Made with <3 by <a href="https://github.com/nnevskij" target="_blank" rel="noopener noreferrer">nnevskij</a></p>
    </div>
</body>
</html>
